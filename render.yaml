databases:
  - name: elite-bank-db
    databaseName: elite_bank
    user: elite_bank
    plan: free
    region: oregon            # or frankfurt / singapore — closest to Cameroon

services:
  - type: web
    name: elite-bank-api
    runtime: python
    plan: free
    region: oregon
    rootDir: backend          # Django project lives in /backend
    branch: main
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
      python manage.py ensure_superuser
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --worker-class gthread --timeout 60 --keep-alive 5 --access-logfile - --max-requests 1000 --max-requests-jitter 50
    healthCheckPath: /healthz/
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true        # Render auto-generates a strong random value
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: elite-bank-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false                # set manually in dashboard after first Vercel deploy
      - key: NOTCHPAY_PUBLIC_KEY
        sync: false                # leave empty for demo mode, or set sandbox key
      - key: EMAIL_HOST_USER
        sync: false                # Gmail address that sends OTP emails
      - key: EMAIL_HOST_PASSWORD
        sync: false                # Gmail App Password (16 chars, NO spaces)
      - key: DEFAULT_FROM_EMAIL
        sync: false                # e.g. "Elite Bank <corantin2005@gmail.com>"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
